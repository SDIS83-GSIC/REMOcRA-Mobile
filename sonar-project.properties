# Configuration SonarQube - Remocra Mobile
sonar.projectKey=remocra-mobile
sonar.projectName=Remocra Mobile
sonar.sourceEncoding=UTF-8
sonar.language=kotlin

# Paramètres spécifiques Android
sonar.android.compileSdk=33
sonar.java.source=17
sonar.java.target=17

# Répertoires source et tests
sonar.sources=app/src/main/java

# Exclusions
sonar.exclusions=**/R.java,\
  **/*.xml,\
  **/res/**,\
  **/build/**,\
  **/*.gradle.kts,\
  **/gradlew*,\
  **/gradle/**,\
  **/schemas/**

# Exclusions de tests
sonar.test.exclusions=**/build/**
